services:
  registry:
    image: registry:3
    environment:
      - REGISTRY_LOG_OTLP=false
    ports:
      - "${REGISTRY_PORT}:5000"
    volumes:
      - registry_data:/var/lib/registry
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:5000/v2/" ]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 3s
  registry-ui:
    image: joxit/docker-registry-ui:2.6.0
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_TITLE=Docker Registry UI
      - DELETE_IMAGES=true
      - SHOW_CONTENT_DIGEST=true
      - NGINX_PROXY_PASS_URL=http://registry:5000
    ports:
      - "${REGISTRY_UI_PORT}:80"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost/" ]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 3s
    depends_on:
      registry:
        condition: service_healthy

volumes:
  registry_data: