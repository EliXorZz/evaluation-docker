upstream api {
    server cat:3000;
    server dog:3000;
}

server {
    listen       80;
    server_name  localhost;

    location / {
        proxy_pass http://api;
    }

    location /cat {
        rewrite ^/cat/?(.*)$ /$1 break;
        proxy_pass http://cat:3000;
    }

    location /dog {
        rewrite ^/dog/?(.*)$ /$1 break;
        proxy_pass http://dog:3000;
    }
}