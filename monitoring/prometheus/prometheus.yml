global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api-cat"
    static_configs:
      - targets: ["api-cat:3000"]

  - job_name: "api-dog"
    static_configs:
      - targets: [ "api-dog:3000" ]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]