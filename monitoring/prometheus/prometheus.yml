global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "cat"
    static_configs:
      - targets: ["cat:3000"]

  - job_name: "dog"
    static_configs:
      - targets: [ "dog:3000" ]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]